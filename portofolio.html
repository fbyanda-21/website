<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portofolio Siswa</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="icon" href="https://files.catbox.moe/b57mhh.png" type="image/x-icon">
  
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 20% 20%, #1b1145 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, #0f1b5c 0%, transparent 40%),
    #0a0a18;
  color:#f3f4ff;
  min-height:100vh;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:60px 10px;
  height:675px;
}

/* ===== LOGO (TERPISAH) ===== */
.logo{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:40px;
}

.logo-box{
  width:50px;
  height:50px;
  border-radius:15px;
  background:linear-gradient(145deg,#6d28d9,#1d4ed8);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.5rem;
}

.logo span{
  font-weight:700;
  font-size:1.2rem;
}

/* ===== HERO ===== */

.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:60px;
  margin-bottom:120px;
}

.hero-text{
  flex:1;
}

.hero h1{
  font-size:3rem;
  font-weight:800;
  background:linear-gradient(120deg,#fff,#a5b4fc,#c084fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}

.skills{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

.skill{
  padding:10px 20px;
  border-radius:40px;
  background:linear-gradient(145deg,#1f1447,#141b52);
  border:1px solid rgba(139,92,246,0.4);
  font-size:0.9rem;
  transition:.3s;
}

.skill:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(139,92,246,0.4);
}

/* FOTO */
.hero-img{
  flex:1;
  display:flex;
  justify-content:center;
}

.hero-img img{
  width:280px;
  border-radius:25px;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.7),
    0 0 40px rgba(139,92,246,0.3);
}

/* ===== INFO SECTION ===== */

.info-section{
  width:100%;
  padding:80px 20px;
  padding-top:0px;
  background:linear-gradient(180deg,#0d0d22,#0a0a18);
}

.divider{
  height:2px;
  width:100%;
  max-width:1200px;
  margin:40px auto;
  background:linear-gradient(
    to right,
    transparent,
    #8b5cf6,
    #6366f1,
    transparent
  );
  box-shadow:0 0 15px rgba(139,92,246,0.5);
}

.info-container{
  max-width:1200px;
  margin:auto;
}

.grid{
  display:flex;
  flex-direction:column;
  gap:30px;
}

.card{
  padding:30px;
  border-radius:25px;
  background:linear-gradient(145deg,#141433,#0f173f);
  border:1px solid rgba(99,102,241,0.3);

  transition: all .3s ease;
}

.card:hover{
  box-shadow:
    0 20px 40px rgba(0,0,0,0.6),
    0 0 25px rgba(139,92,246,0.4);
  border:1px solid rgba(139,92,246,0.6);
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(139,92,246,0.4);
}

.card h3{
  margin-bottom:15px;
  font-size:1.5rem;
  color:#c4b5fd;
}

.card i{
  margin-right:10px;
  color:#818cf8;
}

.card p{
  color:#e0e7ff;
  font-size:0.95rem;
}

.social-bottom{
  margin-top:30px;
  display:flex;
  background:linear-gradient(145deg,#141433,#0f173f);
  border:1px solid rgba(139,92,246,0.6);
  border-radius:35px;
  padding:10px 15px;
  justify-content:center;
  gap:20px;
  transition:.3s;
}

.social-bottom:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(139,92,246,0.4);
}

.social-bottom a{
  width:55px;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:linear-gradient(145deg,#1f1447,#141b52);
  border:1px solid rgba(139,92,246,0.4);
  color:#c4b5fd;
  font-size:1.4rem;
  text-decoration:none;
  transition:.3s;
}

.social-bottom a:hover{
  transform:translateY(-8px) scale(1.1);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.6),
    0 0 25px rgba(139,92,246,0.6);
  color:#ffffff;
}

/* FOOTER */
footer{
  padding:30px;
  text-align:center;
  background:#080814;
  border-top:1px solid rgba(99,102,241,0.2);
  color:#a5b4fc;
  font-size:0.9rem;
}

/* ===== RESPONSIVE ANDROID ===== */
@media(max-width:900px){

  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero-img{
    order:-1; /* FOTO PINDAH KE ATAS */
  }

  .hero h1{
    font-size:2.3rem;
  }

}

/* MUSIC BUTTON */
.music-btn{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(145deg,#6d28d9,#1d4ed8);
  color:white;
  font-size:1.4rem;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(139,92,246,0.6);
  transition:.3s;
  z-index:1000;
}

.music-btn:hover{
  transform:scale(1.1);
}

/* POPUP */
.music-popup{
  position:fixed;
  bottom:30px;
  right:95px;
  width:220px;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(145deg,#141433,#0f173f);
  border:1px solid rgba(139,92,246,0.4);
  box-shadow:0 20px 40px rgba(0,0,0,0.7);
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:.4s;
  z-index:999;
}

.music-popup.show{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.music-popup h3{
  margin-bottom:15px;
  color:#c4b5fd;
  font-size:1rem;
}

.music-popup ul{
  list-style:none;
  padding:0;
}

.music-popup li{
  padding:8px;
  border-radius:10px;
  cursor:pointer;
  transition:.3s;
  font-size:0.9rem;
}

.music-popup li:hover{
  background:rgba(139,92,246,0.3);
}

.music-popup li.active{
  background:linear-gradient(145deg,#6d28d9,#1d4ed8);
  color:#ffffff;
  box-shadow:0 0 15px rgba(139,92,246,0.6);
}

  /* THEME BUTTON */
.theme-toggle{
  position:fixed;
  bottom:100px; /* di atas tombol musik */
  right:25px;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(145deg,#6d28d9,#1d4ed8);
  color:white;
  font-size:1.2rem;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(139,92,246,0.6);
  transition:.3s;
  z-index:1000;
}

.theme-toggle:hover{
  transform:scale(1.1);
}

/* LIGHT MODE */
body.light{
  background:#f3f4ff;
  color:#1e1b4b;
}

body.light .info-section{
  background:#e0e7ff;
}

body.light .card{
  background:white;
  border:1px solid #c7d2fe;
  color:#1e1b4b;
}

body.light .skill{
  background:#eef2ff;
  border:1px solid #c7d2fe;
  color:#1e1b4b;
}

body.light footer{
  background:#dbeafe;
  color:#1e1b4b;
}

body.light .music-popup{
  background:white;
  border:1px solid #c7d2fe;
                              }
  
  /* TEXT FIX LIGHT MODE */
body.light h1{
  -webkit-text-fill-color:unset;
  background:none;
  color:#1e1b4b;
}

body.light .card h3{
  color:#4338ca;
}

body.light .card p{
  color:#1e1b4b;
}

body.light .logo span{
  color:#1e1b4b;
}

body.light .divider{
  box-shadow:none;
}

body.light .social-bottom{
  background:#ffffff;
  border:1px solid #c7d2fe;
}

body.light .social-bottom a{
  background:#eef2ff;
  color:#4338ca;
  border:1px solid #c7d2fe;
}

body.light .music-popup h3{
  color:#4338ca;
}

body.light .music-popup li{
  color:#1e1b4b;
}

</style>
</head>
<body>

<div class="container">

<!-- LOGO TETAP DI ATAS -->
<div class="logo">
  <div class="logo-box"><i id="logoIcon" class="fas fa-graduation-cap"></i></div>
  <span id="logoText">StudentPro</span>
</div>

<div class="hero">

  <div class="hero-text">
    <h1 id="nama">Azzahra Putri</h1>
    <div class="skills" id="skillsContainer"></div>
  </div>

  <div class="hero-img">
    <img id="foto" src="https://randomuser.me/api/portraits/women/44.jpg">
  </div>

</div>

</div>

<section class="info-section">
<div class="divider"></div>
<div class="info-container">

<div class="grid">

  <div class="card">
    <h3><i class="fas fa-house"></i>Alamat</h3>
    <p id="alamat"></p>
  </div>

  <div class="card">
    <h3><i class="fas fa-school"></i>Alamat Sekolah</h3>
    <p id="alamatSekolah"></p>
  </div>

  <div class="card">
    <h3><i class="fas fa-envelope"></i>Email</h3>
    <p id="email"></p>
  </div>

  <div class="card">
    <h3><i class="fas fa-phone"></i>Nomor Telepon</h3>
    <p id="telp"></p>
  </div>

<div class="social-bottom">
  <a href="https://www.tiktok.com/@fbyanxzz?_r=1&_t=ZS-93ssqJNKItA" target="_blank">
    <i class="fab fa-tiktok"></i>
  </a>

  <a href="https://www.instagram.com/fbyan_nnd21?igsh=N21yamdtcXQzZDUz" target="_blank">
    <i class="fab fa-instagram"></i>
  </a>

  <a href="https://youtube.com/@fubiannanuda?si=WhvvB5rloij-VWLQ" target="_blank">
    <i class="fab fa-youtube"></i>
  </a>

  <a href="https://wa.me/6283853983402" target="_blank">
    <i class="fab fa-whatsapp"></i>
  </a>
</div>

</div>

</div>
</section>

<footer>
  © 2026 Portofolio Siswa • Made By Fabian Nanda
</footer>

  <!-- THEME TOGGLE -->
<div class="theme-toggle" id="themeToggle">
  <i class="fas fa-moon"></i>
</div>

<!-- MUSIC BUTTON -->
<div class="music-btn" id="musicToggle">
  <i class="fas fa-music"></i>
</div>

<!-- MUSIC POPUP -->
<div class="music-popup" id="musicPopup">
  <h3>Pilih Lagu</h3>
  <ul>
    <li data-src="https://files.catbox.moe/spadk5.mp3">Death Bed</li>
    <li data-src="https://files.catbox.moe/rg0mtu.mp3">Past Life</li>
    <li data-src="https://files.catbox.moe/c6gtik.mp3">Rude</li>
    <li data-src="https://files.catbox.moe/svkvc3.mp3">Off My Face</li>
    <li data-src="https://files.catbox.moe/mqxmmt.mp3">Love Story (indila)</li>
  </ul>
</div>

<audio id="bgMusic" loop></audio>

<script>
const data = {
  nama: "Fabian Nanda",
  logoIcon: "fa-graduation-cap",
  logoText: "AldaStudent",
  foto: "https://files.catbox.moe/b57mhh.png",
  keahlian: ["Desain","Web Development","Photografi","Videografi","Editing"],
  alamat: "Ds.Wanguk Blk.Bunut Kidul Rt 03 Rw 10 Kec.Anjatan Kab.Indramayu Prov.Jawa Barat Indonesia",
  alamatSekolah: "SMKS AL-HUDA KEDUNGWUNGU ANJATAN",
  email: "fubiannanuda@gmail.com",
  telp: "+62 838-5398-3402"
};

document.getElementById("nama").textContent = data.nama;
document.getElementById("logoText").textContent = data.logoText;
document.getElementById("logoIcon").className = "fas " + data.logoIcon;
document.getElementById("foto").src = data.foto;
document.getElementById("alamat").textContent = data.alamat;
document.getElementById("alamatSekolah").textContent = data.alamatSekolah;
document.getElementById("email").textContent = data.email;
document.getElementById("telp").textContent = data.telp;

const skillsBox = document.getElementById("skillsContainer");
data.keahlian.forEach(skill=>{
  const span = document.createElement("div");
  span.className="skill";
  span.textContent=skill;
  skillsBox.appendChild(span);
});

const cards=document.querySelectorAll('.card');

const observer=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const index=[...cards].indexOf(entry.target);
      setTimeout(()=>{
        entry.target.classList.add('show');
      },index*200);
      observer.unobserve(entry.target);
    }
  });
},{threshold:0.25});

cards.forEach(card=>observer.observe(card));

const musicBtn = document.getElementById("musicToggle");
const popup = document.getElementById("musicPopup");
const audio = document.getElementById("bgMusic");

musicBtn.addEventListener("click", ()=>{
  popup.classList.toggle("show");
});

const musicItems = document.querySelectorAll(".music-popup li");

musicItems.forEach(item=>{
  item.addEventListener("click", ()=>{

    // Hapus active dari semua
    musicItems.forEach(i=>i.classList.remove("active"));

    // Tambah active ke yang dipilih
    item.classList.add("active");

    const src = item.getAttribute("data-src");
    audio.src = src;
    audio.play();

    popup.classList.remove("show");
  });
});

document.addEventListener("click", function(e){
  if(
    !popup.contains(e.target) &&
    !musicBtn.contains(e.target)
  ){
    popup.classList.remove("show");
  }
});

  const themeBtn = document.getElementById("themeToggle");
const body = document.body;
const icon = themeBtn.querySelector("i");

themeBtn.addEventListener("click", ()=>{
  body.classList.toggle("light");

  if(body.classList.contains("light")){
    icon.classList.remove("fa-moon");
    icon.classList.add("fa-sun");
  }else{
    icon.classList.remove("fa-sun");
    icon.classList.add("fa-moon");
  }
});

</script>

</body>
</html>
