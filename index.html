<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader Pro - Tanpa Watermark</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⬇️</text></svg>">
</head>
<body class="dark-theme">
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Memuat Downloader Pro</h2>
            <p>Menyiapkan semua fitur untuk Anda...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-download"></i>
                <h1>Downloader<span class="gradient-text">Pro</span></h1>
            </div>
            
            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle">
                    <i class="fas fa-moon"></i>
                    <span>Mode Gelap</span>
                </button>
                
                <button id="apiTestBtn" class="user-btn" style="background: var(--warning-color);">
                    <i class="fas fa-bolt"></i>
                    <span>Test API</span>
                </button>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-compass"></i> Navigasi</h3>
                <button id="closeSidebar" class="close-sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="sidebar-menu">
                <a href="#" class="menu-item active" id="dashboardBtn">
                    <i class="fas fa-home"></i>
                    <span>Beranda</span>
                </a>
                
                <div class="menu-section">
                    <h4><i class="fas fa-tools"></i> Tools Download</h4>
                    
                    <a href="#" class="menu-item" data-tool="instagram">
                        <i class="fab fa-instagram"></i>
                        <span>Instagram</span>
                        <span class="menu-badge">HD</span>
                    </a>
                    
                    <a href="#" class="menu-item" data-tool="tiktok">
                        <i class="fab fa-tiktok"></i>
                        <span>TikTok</span>
                        <span class="menu-badge">No WM</span>
                    </a>
                    
                    <a href="#" class="menu-item" data-tool="youtube">
                        <i class="fab fa-youtube"></i>
                        <span>YouTube</span>
                        <span class="menu-badge">4K</span>
                    </a>
                    
                    <a href="#" class="menu-item" data-tool="facebook">
                        <i class="fab fa-facebook"></i>
                        <span>Facebook</span>
                        <span class="menu-badge">HD</span>
                    </a>
                </div>
                
                <div class="menu-section">
                    <h4><i class="fas fa-info-circle"></i> Informasi</h4>
                    
                    <a href="#" class="menu-item" id="howToUseBtn">
                        <i class="fas fa-question-circle"></i>
                        <span>Cara Pakai</span>
                    </a>
                    
                    <a href="#" class="menu-item" id="apiStatusBtn">
                        <i class="fas fa-server"></i>
                        <span>Status API</span>
                    </a>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <div class="status-dot online"></div>
                    <span>Server Online</span>
                </div>
                <p class="version">v2.1.0</p>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <button id="menuToggle" class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="breadcrumb">
                    <span>Home</span>
                    <i class="fas fa-chevron-right"></i>
                    <span class="current-page" id="pageTitle">Dashboard</span>
                </div>
                
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Cari platform..." id="platformSearch">
                </div>
            </div>

            <!-- Dashboard Content -->
            <div class="dashboard-container" id="dashboardContainer">
                <!-- Content akan dimuat dinamis -->
            </div>
            
            <!-- Tool Content -->
            <div class="tool-container" id="toolContainer" style="display: none;">
                <!-- Tool content akan dimuat dinamis -->
            </div>
        </main>
    </div>

    <!-- Video Popup -->
    <div id="videoPopup" class="video-popup" style="display: none;">
        <div class="popup-content">
            <button class="close-popup">
                <i class="fas fa-times"></i>
            </button>
            <video controls id="popupVideo">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="script.js"></script>
</body>
</html>
